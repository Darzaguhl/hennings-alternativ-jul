<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sett passord – Hennings Alternativ Jul</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="logo">
      <img src="images/logo.png" alt="Alternativ Jul" class="logo-mark">
      <span class="logo-text">Hennings<br><strong>Alternativ Jul</strong></span>
    </a>
  </div>
</header>

<main id="main">
  <div class="container">
    <div class="signup-card" id="set-password-card" style="margin-top: 56px; margin-bottom: 80px;">
      <h3>Sett et passord</h3>
      <p class="signup-intro" id="set-password-intro">Laster …</p>

      <p id="set-password-error" class="signup-error" hidden></p>

      <form id="set-password-form" hidden>
        <div class="signup-fields">
          <div class="signup-field">
            <label class="signup-label" for="password">Nytt passord</label>
            <input class="signup-input" type="password" id="password" required autocomplete="new-password" minlength="8">
            <span class="signup-hint">Minst 8 tegn.</span>
          </div>
          <div class="signup-field">
            <label class="signup-label" for="password-confirm">Bekreft passord</label>
            <input class="signup-input" type="password" id="password-confirm" required autocomplete="new-password" minlength="8">
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="set-password-submit">Sett passord</button>
        <p class="signup-status" id="set-password-status" role="status" aria-live="polite"></p>
      </form>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="container footer-bottom">
    <p>&copy; <span id="year"></span> Hennings Alternativ Jul. Med varme fra Oslo.</p>
  </div>
</footer>

<script src="js/config.js"></script>
<script src="js/set-password.js"></script>
<script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
